# DevilCore OS v5.0 - GRUB2 Boot Configuration
# 64-bit kernel with VESA framebuffer
# Requirements: qemu-system-x86_64 (NOT qemu-system-i386!)

set timeout=3
set default=0

# Theme colours
set color_normal=light-cyan/black
set color_highlight=black/light-cyan

menuentry "DevilCore OS v5.0 - Privacy Edition" {
    insmod all_video
    insmod gfxterm
    insmod vbe
    insmod vga
    set gfxmode=1024x768x32,800x600x32,auto
    set gfxpayload=keep
    terminal_output gfxterm
    echo 'Loading DevilCore OS v5.0...'
    multiboot2 /boot/kernel.elf
    boot
}

menuentry "DevilCore OS v5.0 - 800x600 Mode" {
    insmod all_video
    insmod gfxterm
    insmod vbe
    set gfxmode=800x600x32,auto
    set gfxpayload=keep
    terminal_output gfxterm
    echo 'Loading DevilCore OS v5.0 (800x600)...'
    multiboot2 /boot/kernel.elf
    boot
}

menuentry "DevilCore OS v5.0 - Safe Mode (VGA Text)" {
    terminal_output console
    echo 'Loading DevilCore OS (text console)...'
    multiboot2 /boot/kernel.elf
    boot
}

menuentry "Reboot" {
    reboot
}

menuentry "Power Off" {
    halt
}
