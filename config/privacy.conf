# config/privacy.conf
# Privacy Configuration for DevilCore

# Privacy mode (enabled by default)
PRIVACY_MODE=yes

# Traffic anonymization
ANONYMIZE_OUTGOING=yes
ANONYMIZE_DNS=yes

# MAC address randomization
RANDOMIZE_MAC=yes

# Disk encryption
ENABLE_ENCRYPTION=yes

# Audit logging
AUDIT_ENABLED=yes
AUDIT_LOG=/var/log/audit.log

# Memory wiping on free
MEMORY_WIPE=yes

# Secure delete
SECURE_DELETE=yes
DELETE_PASSES=3