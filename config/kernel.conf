# config/kernel.conf
# DevilCore Kernel Configuration

# Architecture
ARCH=x86_64

# Build options
DEBUG=y
SMP=y
NETWORKING=y
MODULES=y

# Memory
MEMORY_MAX=256M
HEAP_INITIAL=16M
HEAP_MAX=256M

# Features
ENABLE_TOR=y
ENABLE_VPN=y
ENABLE_MAC=y
ENABLE_SECCOMP=y

# Networking
NETWORK_DRIVERS=r8169 e1000 virtio-net