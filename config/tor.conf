# config/tor.conf
# Tor Configuration for DevilCore

# Tor data directory
DataDirectory /var/lib/tor

# Log (file) info, notice, warn
Log notice file /var/log/tor.log

# SOCKS port
SocksPort 9050

# Control port
ControlPort 9051

# Enable encryption
EncryptDirData 1

# Bridge modes
Bridge obfs3 192.168.1.1:443

# Private bridges
ExcludeNodes {ru},{ua},{by}

# Logging
SafeLogging 1