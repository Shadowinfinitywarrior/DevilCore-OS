# config/network.conf
# Network Configuration for DevilCore

# Default network settings
NETWORK_ENABLED=yes
DHCP=yes
IP=192.168.1.100
NETMASK=255.255.255.0
GATEWAY=192.168.1.1
DNS=8.8.8.8,1.1.1.1

# Privacy settings  
TOR_ENABLED=yes
TOR_BRIDGE=obfs3
DOH_ENABLED=yes
DOH_SERVER=https://dns.google/dns-query

# VPN settings
VPN_TYPE=wireguard
VPN_ENABLED=no